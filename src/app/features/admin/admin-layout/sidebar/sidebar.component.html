<aside
  class="fixed top-[72px] left-0 h-[calc(100vh-72px)] w-64 bg-white/80 backdrop-blur-md
         border-r border-red-200 shadow-lg flex flex-col justify-between transition-all duration-300">

  <!-- Left: Logo -->
  <div class="flex items-center space-x-3 px-6 py-4 border-b border-gray-200">
    <i class="fa-solid fa-gear text-2xl text-red-600 animate-spin-slow"></i>
    <h1 class="text-2xl font-extrabold tracking-tight text-gray-800">Admin Panel</h1>
  </div>
  
  <!-- Nav Links -->
  <nav class="flex-1 p-4 space-y-2">
    <a
      routerLink="/admin/dashboard"
      routerLinkActive="!bg-gradient-to-r from-red-600 to-orange-500 text-white font-semibold shadow-md"
      class="flex items-center space-x-3 px-5 py-3 rounded-lg hover:bg-red-50 text-gray-700
             transition-all duration-300"
    >
      <i class="fa-solid fa-chart-line w-5 text-center"></i>
      <span class="text-base font-medium">Dashboard</span>
    </a>

    <a
      routerLink="/admin/products"
      routerLinkActive="!bg-gradient-to-r from-red-600 to-orange-500 text-white font-semibold shadow-md"
      class="flex items-center space-x-3 px-5 py-3 rounded-lg hover:bg-red-50 text-gray-700
             transition-all duration-300"
    >
      <i class="fa-solid fa-box w-5 text-center"></i>
      <span class="text-base font-medium">Products</span>
    </a>

    <a
      routerLink="/admin/orders"
      routerLinkActive="!bg-gradient-to-r from-red-600 to-orange-500 text-white font-semibold shadow-md"
      class="flex items-center space-x-3 px-5 py-3 rounded-lg hover:bg-red-50 text-gray-700
             transition-all duration-300"
    >
      <i class="fa-solid fa-cart-shopping w-5 text-center"></i>
      <span class="text-base font-medium">Orders</span>
    </a>

    <a
      routerLink="/admin/users"
      routerLinkActive="!bg-gradient-to-r from-red-600 to-orange-500 text-white font-semibold shadow-md"
      class="flex items-center space-x-3 px-5 py-3 rounded-lg hover:bg-red-50 text-gray-700
             transition-all duration-300"
    >
      <i class="fa-solid fa-users w-5 text-center"></i>
      <span class="text-base font-medium">Users</span>
    </a>

    <a
      routerLink="/admin/analytics"
      routerLinkActive="!bg-gradient-to-r from-red-600 to-orange-500 text-white font-semibold shadow-md"
      class="flex items-center space-x-3 px-5 py-3 rounded-lg hover:bg-red-50 text-gray-700
             transition-all duration-300"
    >
      <i class="fa-solid fa-chart-pie w-5 text-center"></i>
      <span class="text-base font-medium">Analytics</span>
    </a>
  </nav>

  <!-- Footer / Logout -->
  <div class="p-5 border-t border-gray-200">
    <button
      (click)="logout()"
      class="w-full bg-gradient-to-r from-red-600 to-orange-500 text-white py-3 rounded-lg
             font-semibold shadow-md hover:scale-105 transition-all duration-300 flex items-center justify-center space-x-2"
    >
      <i class="fa-solid fa-right-from-bracket"></i>
      <span>Logout</span>
    </button>
  </div>
</aside>
