<header
  class="fixed top-0 left-0 right-0 z-50 bg-white
         text-white px-8 py-4 flex items-center justify-between shadow-lg backdrop-blur-md"
>
 <a routerLink="/home"
      class="text-2xl font-extrabold tracking-wide bg-gradient-to-r from-red-600 to-orange-500 bg-clip-text text-transparent hover:scale-105 transition-transform duration-300">ShoeX</a>

  <!-- Right: User Profile -->
  <div class="relative">
    <!-- Profile Button -->
    <button
      (click)="toggleProfileMenu()"
      class="flex items-center space-x-3 bg-red-500 px-3 py-1.5 rounded-full hover:bg-red-500 transition-all duration-300"
    >
      <i class="fa-solid fa-user text-sm"></i>
      <span class="text-sm font-medium">{{ adminName }}</span>
      <i class="fa-solid fa-chevron-down text-xs"></i>
    </button>

    <!-- Dropdown Menu -->
    <div
      *ngIf="showProfileMenu"
      class="absolute right-0 mt-2 w-56 bg-white text-gray-800 rounded-xl shadow-lg border border-red-100 animate-fade-in"
    >
      <div class="p-4 border-b border-gray-200">
        <h3 class="font-semibold text-red-600">{{ adminName }}</h3>
        <p class="text-sm text-gray-500">{{ adminEmail }}</p>
        <span class="inline-block mt-1 text-xs text-white bg-gradient-to-r from-red-500 to-orange-400 px-2 py-0.5 rounded-full">
          {{ adminRole }}
        </span>
      </div>

      <div class="p-3 flex flex-col space-y-2">
        <button
          routerLink="/admin/settings"
          class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-red-50 text-sm text-gray-700"
        >
          <i class="fa-solid fa-gear text-red-500"></i> Settings
        </button>
        <button
          (click)="logout()"
          class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-red-50 text-sm text-red-600 font-semibold"
        >
          <i class="fa-solid fa-right-from-bracket"></i> Logout
        </button>
      </div>
    </div>
  </div>
</header>
