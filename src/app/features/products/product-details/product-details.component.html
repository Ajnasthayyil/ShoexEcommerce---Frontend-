<div class="pt-20 pb-20 bg-gray-50">
  <div class="max-w-5xl mx-auto p-8 grid grid-cols-1 md:grid-cols-2 gap-8" *ngIf="product">

  <!-- Product Image -->
  <div class="relative">
    <img
      [src]="product.imageUrl"
      [alt]="product.name"
      class="w-full h-96 object-cover rounded-xl shadow-lg"
    />
  </div>

  <!-- Product Info -->
  <div class="flex flex-col">
    <h2 class="text-3xl font-bold text-gray-900 mb-2">{{ product.name }}</h2>
    <p class="text-gray-500 mb-4">{{ product.brand }}</p>
    <p class="text-gray-700 mb-4">{{ product.description }}</p>
    <p class="text-2xl font-bold text-green-600 mb-6">₹{{ product.price }}</p>

    <!-- Sizes -->
    <div class="mt-6">
      <label class="block text-gray-700 font-semibold mb-2">Available Sizes:</label>
      <div class="flex flex-wrap gap-3">
        <button
          *ngFor="let size of product.availableSizes"
          (click)="selectSize(size)"
          [ngClass]="selectedSize === size ? 'bg-red-500 text-white' : 'bg-gray-200 text-gray-700'"
          class="px-4 py-2 rounded-lg border hover:bg-gray-300 transition">
          {{ size }}
        </button>
      </div>
    </div>

    <!-- Quantity -->
    <div class="mt-6">
      <label class="block text-gray-700 font-semibold mb-2">Quantity:</label>
      <div class="flex items-center gap-4">
        <button
          (click)="decrementQuantity()"
          class="bg-gray-200 text-gray-700 px-3 py-2 rounded hover:bg-gray-300 transition"
        >
          <i class="fas fa-minus"></i>
        </button>
        <span class="text-lg font-medium">{{ quantity }}</span>
        <button
          (click)="incrementQuantity()"
          class="bg-gray-200 text-gray-700 px-3 py-2 rounded hover:bg-gray-300 transition"
        >
          <i class="fas fa-plus"></i>
        </button>
      </div>
    </div>

    <!-- Action Buttons -->
    <div class="flex gap-4 mt-8">
      <button (click)="addToCart()"
        class="bg-black hover:bg-gray-700 text-white px-6 py-3 rounded-lg font-medium transition flex items-center gap-2">
        <i class="fas fa-cart-plus"></i> Add to Cart
      </button>

      <button (click)="buyNow()"
        [disabled]="!selectedSize"
        [ngClass]="selectedSize ? 'bg-red-500 hover:bg-red-600' : 'bg-gray-400 cursor-not-allowed'"
        class="text-white px-6 py-3 rounded-lg font-medium transition shadow-lg transform hover:scale-105 flex items-center gap-2">
        <i class="fas fa-shopping-bag"></i> Buy Now
      </button>
    </div>
  </div>

  </div>
</div>
