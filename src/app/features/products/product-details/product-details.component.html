<div class="min-h-screen bg-gray-50/30 py-8 px-6 animate-fadeIn pt-32">
  <div class="max-w-4xl mx-auto" *ngIf="product">

    <!-- Breadcrumbs / Back Link -->
    <div class="mb-8 animate-fadeIn" style="animation-delay: 0.1s">
      <a routerLink="/products"
        class="group inline-flex items-center gap-2 text-[10px] font-black uppercase tracking-[0.2em] text-gray-400 hover:text-red-600 transition-colors">
        <i class="fa-solid fa-arrow-left transition-transform group-hover:-translate-x-1"></i>
        Back to Collection
      </a>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">

      <!-- Product Image Gallery (lg:col-span-6) -->
      <div class="lg:col-span-6 space-y-6 animate-fadeIn" style="animation-delay: 0.2s">
        <div
          class="relative group rounded-[3rem] overflow-hidden bg-white shadow-2xl shadow-gray-200/50 border border-gray-100 aspect-square md:aspect-auto md:h-[420px]">
          <img [src]="mainImage || product.imageUrl" [alt]="product.name"
            class="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-110" />

          <!-- Glossy Overlay -->
          <div
            class="absolute inset-0 bg-gradient-to-tr from-black/10 via-transparent to-transparent opacity-30 group-hover:opacity-10 transition-opacity duration-700">
          </div>

          <!-- Wishlist Toggle -->
          <button (click)="toggleWishlist()"
            class="absolute top-8 right-8 w-14 h-14 rounded-full flex items-center justify-center transition-all duration-300 transform shadow-2xl border border-white/50 backdrop-blur-md z-10 active:scale-95"
            [ngClass]="isInWishlist() ? 'bg-red-600 text-white border-red-500' : 'bg-white/80 text-gray-400 hover:text-red-600'">
            <i class="fa-solid fa-heart text-lg"></i>
          </button>

          <!-- Label -->
          <div class="absolute bottom-8 left-8">
            <span
              class="px-6 py-3 bg-black/70 backdrop-blur-xl text-white text-xs font-black uppercase tracking-[0.3em] rounded-2xl shadow-2xl">
              {{ product.brand }}
            </span>
          </div>
        </div>

        <!-- Thumbnails -->
        <div class="flex gap-4 overflow-x-auto pb-4 custom-scrollbar"
          *ngIf="product.images && product.images.length > 0">
          <button *ngFor="let img of product.images" (click)="changeMainImage(img.url)"
            class="flex-shrink-0 w-24 h-24 rounded-3xl overflow-hidden border-2 transition-all duration-300 relative group active:scale-95"
            [ngClass]="(mainImage || product.imageUrl) === img.url ? 'border-red-600 shadow-xl shadow-red-500/10' : 'border-transparent bg-white shadow-sm hover:border-gray-200'">
            <img [src]="img.url" class="w-full h-full object-cover transition-opacity group-hover:opacity-80" />
            <div *ngIf="(mainImage || product.imageUrl) === img.url" class="absolute inset-0 bg-red-600/5"></div>
          </button>
        </div>
      </div>

      <!-- Product Information (lg:col-span-6) -->
      <div class="lg:col-span-6 flex flex-col animate-slideInRight" style="animation-delay: 0.3s">

        <div class="mb-6">
          <div class="flex items-center gap-3 mb-3">
            <span class="w-8 h-[2px] bg-red-600"></span>
            <span class="text-[10px] font-black uppercase tracking-[0.4em] text-red-600">Available Now</span>
          </div>
          <h1 class="text-3xl md:text-4xl font-black text-gray-900 tracking-tight leading-tight mb-3 uppercase">
            {{ product.name }}
          </h1>
          <p class="text-gray-400 font-bold leading-relaxed text-base mb-6">{{ product.description }}</p>
          <div class="flex items-baseline gap-4">
            <span class="text-4xl font-black text-gray-900 tracking-tighter">₹{{ product.price }}</span>
            <span class="text-sm font-black text-gray-300 uppercase tracking-widest">Incl. all taxes</span>
          </div>
        </div>

        <!-- Size Selection -->
        <div class="mb-6 p-6 bg-white rounded-[2.5rem] border border-gray-100 shadow-sm">
          <div class="mb-4">
            <label class="text-xs font-black uppercase tracking-widest text-gray-400">Select Size (UK)</label>
          </div>
          <div class="flex flex-wrap gap-2">
            <button *ngFor="let size of product.mappedSizes" (click)="selectSize(size.id)"
              [ngClass]="selectedSizeId === size.id ? 'bg-gray-900 text-white border-gray-900 shadow-xl shadow-gray-400' : 'bg-gray-50 text-gray-500 border-transparent hover:border-gray-200'"
              class="w-12 h-12 rounded-2xl border-2 font-black text-xs transition-all active:scale-90 flex items-center justify-center">
              {{ size.name }}
            </button>
            <p *ngIf="product.mappedSizes?.length === 0" class="text-xs font-bold text-gray-400 italic">No sizes
              currently available.</p>
          </div>
        </div>

        <!-- Quantity Selector -->
        <div class="mb-8 flex items-center gap-6">
          <span class="text-[10px] font-black uppercase tracking-widest text-gray-400">Quantity</span>
          <div class="flex items-center bg-white p-2 rounded-2xl border border-gray-100 shadow-sm">
            <button (click)="decrementQuantity()"
              class="w-8 h-8 flex items-center justify-center text-gray-400 hover:text-gray-900 hover:bg-gray-50 rounded-xl transition-all active:scale-95">
              <i class="fa-solid fa-minus text-xs"></i>
            </button>
            <span class="w-10 text-center font-black text-gray-900 text-base">{{ quantity }}</span>
            <button (click)="incrementQuantity()"
              class="w-8 h-8 flex items-center justify-center text-gray-400 hover:text-gray-900 hover:bg-gray-50 rounded-xl transition-all active:scale-95">
              <i class="fa-solid fa-plus text-xs"></i>
            </button>
          </div>
        </div>

        <!-- CTA Actions -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <button (click)="addToCart()" [disabled]="isOutOfStock"
            class="group relative overflow-hidden py-5 bg-gray-900 disabled:bg-gray-200 rounded-[2rem] font-black uppercase tracking-[0.2em] text-[10px] text-white shadow-2xl transition-all active:scale-95 flex items-center justify-center gap-3">
            <div
              class="absolute inset-0 bg-gradient-to-r from-red-600 to-orange-500 opacity-0 group-hover:opacity-100 transition-opacity duration-500">
            </div>
            <i class="fa-solid fa-cart-shopping relative z-10 text-sm"></i>
            <span class="relative z-10">{{ isOutOfStock ? 'Out of Stock' : 'Add to Cart' }}</span>
          </button>

          <button (click)="buyNow()" [disabled]="isOutOfStock"
            class="py-5 bg-white border-2 border-gray-900 disabled:border-gray-200 disabled:text-gray-300 rounded-[2rem] font-black uppercase tracking-[0.2em] text-[10px] text-gray-900 hover:bg-gray-50 transition-all active:scale-95 flex items-center justify-center gap-3 shadow-lg shadow-gray-100/50">
            <i class="fa-solid fa-bolt-lightning text-sm"></i>
            <span>Buy Now</span>
          </button>
        </div>

        <!-- Trust Badges -->
        <div class="mt-8 grid grid-cols-3 gap-4 border-t border-gray-100 pt-8">
          <div class="flex flex-col items-center text-center">
            <i class="fa-solid fa-truck-fast text-gray-300 text-xl mb-3"></i>
            <span class="text-[9px] font-black uppercase tracking-widest text-gray-400">Fast Shipping</span>
          </div>
          <div class="flex flex-col items-center text-center border-x border-gray-50">
            <i class="fa-solid fa-shield-check text-gray-300 text-xl mb-3"></i>
            <span class="text-[9px] font-black uppercase tracking-widest text-gray-400">Original Only</span>
          </div>
          <div class="flex flex-col items-center text-center">
            <i class="fa-solid fa-arrow-rotate-left text-gray-300 text-xl mb-3"></i>
            <span class="text-[9px] font-black uppercase tracking-widest text-gray-400">Easy Returns</span>
          </div>
        </div>

      </div>
    </div>

  </div>

  <!-- Loading / Empty State Shimmer -->
  <div *ngIf="!product" class="max-w-7xl mx-auto flex flex-col items-center py-32">
    <div class="w-16 h-16 border-4 border-red-100 border-t-red-600 rounded-full animate-spin"></div>
    <p class="mt-8 text-gray-400 font-bold uppercase tracking-widest text-xs">Loading Excellence...</p>
  </div>
</div>
