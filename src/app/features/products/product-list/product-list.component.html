  <div class="pt-20 pb-20 bg-gray-50">
    <div class="flex justify-center mt-6 mb-10">
    <div class="relative w-full max-w-md">
      <input
        type="text"
        [(ngModel)]="searchQuery"
        (ngModelChange)="filterProducts()"
        placeholder="Search for your favorite brands..."
        class="w-full py-3 pl-12 pr-4 text-gray-700 bg-white border border-gray-300 rounded-full shadow-md focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-red-500 transition-all"/>
      <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"></i>
    </div>
  </div>
    <!-- Section Title -->
    <h2 class="text-3xl font-extrabold text-center mb-8 text-gray-900 tracking-wide">
      Premium Branded Footwear Collection 
    </h2>

    
  <div class="my-10 flex flex-wrap items-center justify-center gap-6 rounded-2xl">
    
  <div class="flex flex-wrap items-center justify-between gap-4 bg-white/70 backdrop-blur-md p-4 rounded-2xl shadow-md border border-red-100">

    <div
    class="w-full max-w-5xl mx-auto my-8 flex flex-wrap items-center justify-between gap-4 bg-white backdrop-blur-lg p-8 rounded-2xl shadow-lg border border-black-200"
  >
    <!-- Heading -->
    <h3 class="text-lg font-semibold text-gray-800 flex items-center gap-2">
      <i class="fa-solid fa-filter text-red-500"></i> Filters
    </h3>

    <!-- Gender Filter -->
    <div class="flex items-center gap-2 bg-white border border-red-200 rounded-xl px-3 py-2 shadow-sm">
      <label class="text-gray-700 font-medium">Gender:</label>
      <select
        [(ngModel)]="selectedGender"
        (change)="filterProducts()"
        class="w-48 px-4 py-2 rounded-xl border border-red-300 bg-white text-gray-800 shadow-sm hover:bg-white focus:ring-2 focus:ring-red-300 focus:border-red-400 transition duration-200 outline-none"
      >
        <option value="">All Genders</option>
        <option *ngFor="let gender of genders" [value]="gender">{{ gender }}</option>
      </select>
    </div>

    <!-- Price Filter -->
    <div class="flex items-center gap-2 bg-white border border-red-200 rounded-xl px-3 py-2 shadow-sm">
      <label class="text-gray-700 font-medium">Price:</label>
      <select
        [(ngModel)]="selectedPriceRange"
        (change)="filterProducts()"
        class="w-48 px-4 py-2 rounded-xl border border-red-300 bg-white text-gray-800 shadow-sm hover:bg-white focus:ring-2 focus:ring-red-300 focus:border-red-400 transition duration-200 outline-none"
      >
        <option value="">All Prices</option>
        <option value="1000-2999">₹1000 - ₹2999</option>
        <option value="3000-5999">₹3000 - ₹5999</option>
        <option value="above5999">Above ₹5999</option>
      </select>
    </div>

    <!-- Clear Filters Button -->
    <button
      (click)="clearFilters()"
      class="flex items-center gap-2 bg-gradient-to-r from-red-400 to-red-600 text-white px-6 py-2 rounded-xl hover:from-red-500 hover:to-red-700 transition-all duration-300 shadow-md font-semibold active:scale-95"
    >
      <i class="fa-solid fa-rotate-right"></i>
      Clear Filters
    </button>
  </div>
<!-- Product Grid -->
<div class="px-10"> <!-- same padding for all pages -->
  <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-8">

    <div class="bg-white border border-gray-300 rounded-2xl shadow-md hover:shadow-2xl
                transition hover:-translate-y-2 cursor-pointer p-5 flex flex-col"
         *ngFor="let item of paginatedProducts">

      <!-- Image -->
      <img [src]="item.imageUrl" [alt]="item.name"
        class="w-full h-56 object-cover rounded-xl mb-4">

      <h3 class="text-lg font-bold text-gray-900">{{ item.name }}</h3>
      <p class="text-sm text-gray-500 mb-1">{{ item.brand }}</p>
      <p class="text-xl font-bold text-green-600 mb-4">₹{{ item.price }}</p>

      <!-- Action Buttons -->
      <div class="flex items-center justify-between gap-2 mb-3">
        <button (click)="viewDetails(item.id)"
          class="flex-[3] bg-red-600 hover:bg-red-700 text-white py-2 rounded-lg
                 text-sm font-medium transition whitespace-nowrap">
          View Details
        </button>

        <button (click)="toggleWishlist(item)"
          class="flex-[0.5] py-2 px-1 rounded-lg text-sm font-medium transition flex justify-center items-center"
          [ngClass]="isInWishlist(item) ? 'bg-red-100 text-red-600 border-red-600' : 'bg-gray-200 text-gray-700 border-gray-300'">
          <i class="fa-solid fa-heart"></i>
        </button>
      </div>

      <button (click)="addToCart(item)"
        [disabled]="isAddingToCart"
        class="w-full bg-gray-900 hover:bg-gray-900 text-white rounded-lg py-2
               font-semibold transition shadow-sm disabled:opacity-50 disabled:cursor-not-allowed">
        Add to Cart
      </button>
    </div>
  </div>

  <!-- Pagination Controls -->
  <div class="flex justify-center items-center mt-10 gap-2">
    <button
      (click)="changePage(currentPage - 1)"
      [disabled]="currentPage === 1"
      class="px-4 py-2 bg-gray-200 rounded-lg hover:bg-gray-300 disabled:opacity-50">
      Prev
    </button>

    <ng-container *ngFor="let page of [].constructor(totalPages); let i = index">
      <button
        (click)="changePage(i + 1)"
        [ngClass]="{
          'bg-red-600 text-white': currentPage === i + 1,
          'bg-gray-200 hover:bg-gray-300': currentPage !== i + 1
        }"
        class="px-4 py-2 rounded-lg font-semibold transition-all">
        {{ i + 1 }}
      </button>
    </ng-container>

    <button
      (click)="changePage(currentPage + 1)"
      [disabled]="currentPage === totalPages"
      class="px-4 py-2 bg-gray-200 rounded-lg hover:bg-gray-300 disabled:opacity-50">
      Next
    </button>
  </div>
</div>
