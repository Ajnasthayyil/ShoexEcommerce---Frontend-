<div class="min-h-screen bg-gray-50/30 pb-32">

  <!-- Premium Hero / Search Section -->
  <div class="pt-32 pb-16 px-6 bg-white border-b border-gray-100">
    <div class="max-w-7xl mx-auto flex flex-col items-center">
      <h2 class="text-xs font-black text-red-600 uppercase tracking-[0.3em] mb-4 animate-fadeIn">Premium Collection
      </h2>
      <h1 class="text-4xl md:text-6xl font-black text-gray-900 text-center mb-10 tracking-tight animate-slideInUp">
        Step into the <span
          class="bg-clip-text text-transparent bg-gradient-to-r from-red-600 to-orange-500">Future</span>
      </h1>

      <div class="relative w-full max-w-lg animate-fadeIn" style="animation-delay: 0.2s">
        <div class="absolute inset-y-0 left-6 flex items-center pointer-events-none">
          <i class="fa-solid fa-magnifying-glass text-gray-400"></i>
        </div>
        <input type="text" [(ngModel)]="searchQuery" (ngModelChange)="filterProducts()"
          placeholder="Search for brands, styles, or collections..."
          class="w-full py-4 pl-16 pr-8 text-base font-medium text-gray-900 bg-gray-50 border-2 border-transparent rounded-[2.5rem] focus:bg-white focus:border-red-500/20 focus:ring-4 focus:ring-red-500/5 transition-all outline-none shadow-sm" />
      </div>
    </div>
  </div>

  <div class="max-w-7xl mx-auto px-6 mt-12">
    <!-- Sophisticated Filters -->
    <div
      class="flex flex-wrap items-center justify-between gap-6 mb-16 bg-white p-6 rounded-[2.5rem] border border-gray-100 shadow-xl shadow-gray-200/20 animate-fadeIn"
      style="animation-delay: 0.3s">
      <div class="flex flex-wrap gap-4">
        <!-- Gender Filter -->
        <div class="relative group">
          <select [(ngModel)]="selectedGender" (change)="filterProducts()"
            class="appearance-none pl-6 pr-12 py-3 bg-gray-50 border border-transparent rounded-2xl font-black text-[11px] uppercase tracking-widest text-gray-600 hover:bg-gray-100 hover:text-gray-900 transition-all outline-none cursor-pointer">
            <option value="">All Genders</option>
            <option *ngFor="let gender of genders" [value]="gender">{{ gender }}</option>
          </select>
          <i
            class="fa-solid fa-chevron-down absolute right-5 top-1/2 -translate-y-1/2 text-[10px] text-gray-400 pointer-events-none group-hover:text-gray-900"></i>
        </div>

        <!-- Price range Filter -->
        <div class="relative group">
          <select [(ngModel)]="selectedPriceRange" (change)="filterProducts()"
            class="appearance-none pl-6 pr-12 py-3 bg-gray-50 border border-transparent rounded-2xl font-black text-[11px] uppercase tracking-widest text-gray-600 hover:bg-gray-100 hover:text-gray-900 transition-all outline-none cursor-pointer">
            <option value="">Any Price</option>
            <option value="1000-2999">₹1k - ₹3k</option>
            <option value="3000-5999">₹3k - ₹6k</option>
            <option value="above5999">Premium Only</option>
          </select>
          <i
            class="fa-solid fa-chevron-down absolute right-5 top-1/2 -translate-y-1/2 text-[10px] text-gray-400 pointer-events-none group-hover:text-gray-900"></i>
        </div>
      </div>

      <button (click)="clearFilters()"
        class="text-[10px] font-black uppercase tracking-[0.2em] text-gray-400 hover:text-red-600 flex items-center gap-2 transition-colors">
        <i class="fa-solid fa-rotate-right"></i>
        Clear All
      </button>
    </div>

    <!-- Designer Product Grid -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-10">
      <div *ngFor="let item of paginatedProducts; let i = index" (click)="viewDetails(item.id)"
        class="group relative bg-white rounded-[3rem] border border-gray-100 p-6 hover:shadow-2xl hover:shadow-red-500/5 transition-all duration-700 cursor-pointer animate-fadeInUp"
        [style.animation-delay]="(i * 0.1) + 's'">

        <!-- Hover Zoom Background -->
        <div
          class="absolute inset-0 bg-red-50/30 rounded-[3rem] opacity-0 group-hover:opacity-100 transition-opacity duration-700 pointer-events-none">
        </div>

        <!-- Image Container -->
        <div class="relative h-64 w-full rounded-[2.5rem] overflow-hidden mb-8 shadow-sm bg-gray-50">
          <img [src]="item.imageUrl" [alt]="item.name"
            class="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-110" />

          <!-- Glossy Overlay -->
          <div
            class="absolute inset-0 bg-gradient-to-t from-black/20 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-700">
          </div>

          <!-- Wishlist Button -->
          <button (click)="$event.stopPropagation(); toggleWishlist(item)"
            class="absolute top-4 right-4 w-11 h-11 rounded-full flex items-center justify-center transition-all duration-300 transform translate-y-[-10px] opacity-0 group-hover:translate-y-0 group-hover:opacity-100 border border-white/50 backdrop-blur-md shadow-lg"
            [ngClass]="isInWishlist(item) ? 'bg-red-600 text-white' : 'bg-white/80 text-gray-400 hover:text-red-600'">
            <i class="fa-solid fa-heart text-sm"></i>
          </button>

          <!-- Label -->
          <div class="absolute bottom-4 left-4">
            <span
              class="px-4 py-2 bg-black/70 backdrop-blur-md text-white text-[9px] font-black uppercase tracking-widest rounded-xl">
              {{ item.brand }}
            </span>
          </div>
        </div>

        <!-- Details -->
        <div class="relative px-2">
          <h3 class="text-xl font-black text-gray-900 mb-2 truncate group-hover:text-red-600 transition-colors">
            {{ item.name }}
          </h3>
          <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-6">{{ item.gender }} Collection
          </p>

          <div class="flex items-center justify-between border-t border-gray-50 pt-6">
            <p class="text-2xl font-black text-gray-900 tracking-tighter">₹{{ item.price }}</p>
            <div
              class="w-12 h-12 rounded-2xl bg-gray-50 flex items-center justify-center text-gray-900 group-hover:bg-red-600 group-hover:text-white transition-all duration-500 animate-pulse">
              <i class="fa-solid fa-arrow-right text-xs"></i>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Modern Pagination -->
    <div *ngIf="totalPages > 1" class="flex justify-center items-center mt-24 gap-4 animate-fadeIn">
      <button (click)="changePage(currentPage - 1)" [disabled]="currentPage === 1"
        class="w-14 h-14 bg-white border border-gray-100 rounded-2xl flex items-center justify-center text-gray-400 hover:text-red-600 hover:shadow-xl transition-all disabled:opacity-30 disabled:hover:text-gray-400">
        <i class="fa-solid fa-chevron-left text-xs"></i>
      </button>

      <div class="flex gap-2">
        <ng-container *ngFor="let _ of [].constructor(totalPages); let i = index">
          <button (click)="changePage(i + 1)"
            class="w-14 h-14 rounded-2xl font-black text-xs transition-all tracking-widest"
            [ngClass]="currentPage === i + 1 ? 'bg-gray-900 text-white shadow-2xl shadow-gray-400' : 'bg-white border border-gray-100 text-gray-400 hover:border-red-100 hover:text-red-600'">
            {{ i + 1 }}
          </button>
        </ng-container>
      </div>

      <button (click)="changePage(currentPage + 1)" [disabled]="currentPage === totalPages"
        class="w-14 h-14 bg-white border border-gray-100 rounded-2xl flex items-center justify-center text-gray-400 hover:text-red-600 hover:shadow-xl transition-all disabled:opacity-30 disabled:hover:text-gray-400">
        <i class="fa-solid fa-chevron-right text-xs"></i>
      </button>
    </div>

    <!-- WOW Empty State -->
    <div *ngIf="filteredProducts.length === 0" class="max-w-xl mx-auto py-32 text-center animate-fadeIn">
      <div class="w-24 h-24 bg-gray-100 rounded-[2rem] flex items-center justify-center mx-auto mb-8">
        <i class="fa-solid fa-shoe-prints text-3xl text-gray-300"></i>
      </div>
      <h3 class="text-3xl font-black text-gray-900 mb-4 uppercase tracking-tight">No style found</h3>
      <p class="text-gray-500 font-medium mb-10">We couldn't find any products matching your specific selection.</p>
      <button (click)="clearFilters()"
        class="bg-gray-900 text-white px-10 py-5 rounded-[2rem] font-black uppercase text-[10px] tracking-widest hover:bg-red-600 transition-all shadow-2xl">
        Reset Preferences
      </button>
    </div>
  </div>
</div>
