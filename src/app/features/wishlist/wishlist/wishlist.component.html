<div class="max-w-6xl mx-auto p-8 pt-24">
   <div class="flex items-center justify-center mb-10">
    <h2 class="text-3xl font-bold text-gray-900 flex items-center gap-3">
      <i class="fa-solid fa-heart text-red-500"></i>
      My Wishlist
    </h2>
  </div>

  <div
    *ngIf="wishlist.length > 0; else emptyWishlist"
    class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8"
  >
    <div
      *ngFor="let item of wishlist"
      class="bg-white rounded-xl shadow-lg overflow-hidden hover:shadow-2xl transition relative group"
    >
      <img
        [src]="item.imageUrl"
        [alt]="item.name"
        class="w-full h-64 object-cover group-hover:scale-105 transition-transform duration-300"
      />

      <button
        (click)="removeFromWishlist(item)"
        class="absolute top-4 right-4 bg-white bg-opacity-75 p-2 rounded-full hover:bg-opacity-100 transition"
      >
        <i class="fas fa-trash text-gray-600 hover:text-red-500"></i>
      </button>

      <div class="p-6 flex flex-col">
        <h3 class="text-lg font-semibold text-gray-900 mb-1">
          {{ item.name }}
        </h3>
        <p class="text-gray-500 mb-3 text-sm">{{ item.brand }}</p>
        <p class="text-green-600 font-bold mb-4">₹{{ item.price }}</p>

        <div class="flex gap-2 mt-auto">
          <button
            (click)="moveToCart(item)"
            class="flex-1 bg-black hover:bg-gray-800 text-white px-3 py-1.5 rounded-md font-medium text-sm transition flex items-center justify-center gap-2"
          >
            <i class="fas fa-cart-plus text-xs"></i> Cart
          </button>

          <button
            (click)="viewProduct(item)"
            class="flex-1 bg-red-500 hover:bg-red-600 text-white px-3 py-1.5 rounded-md font-medium text-sm transition flex items-center justify-center gap-2"
          >
            <i class="fas fa-eye text-xs"></i> View
          </button>
        </div>
      </div>
    </div>
  </div>

  <ng-template #emptyWishlist>
    <div class="text-center mt-20">
      <i class="fas fa-heart-broken text-gray-400 text-6xl mb-4"></i>
      <h3 class="text-2xl font-semibold text-gray-700 mb-2">
        Your wishlist is empty
      </h3>
      <p class="text-gray-500 mb-6">
        Start adding your favorite products here!
      </p>
      <button
        routerLink="/products"
        class="bg-red-500 hover:bg-red-600 text-white px-5 py-2 rounded-lg font-medium transition shadow-lg text-sm"
      >
        Browse Products
      </button>
    </div>
  </ng-template>
</div>
