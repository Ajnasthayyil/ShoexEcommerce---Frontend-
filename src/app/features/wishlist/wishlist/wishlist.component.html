<div class="min-h-screen bg-gray-50/50 py-16 px-6 animate-fadeIn pt-32">
  <div class="max-w-7xl mx-auto">

    <!-- Page Header -->
    <div class="flex flex-col items-center mb-16 text-center">
      <div class="w-16 h-16 bg-red-100 rounded-2xl flex items-center justify-center mb-4 shadow-sm">
        <i class="fa-solid fa-heart text-2xl text-red-600 animate-pulse"></i>
      </div>
      <h2 class="text-4xl font-extrabold text-gray-900 tracking-tight mb-2">
        My Wishlist
      </h2>
      <p class="text-gray-500 font-medium max-w-md">Keep track of the styles you love. Your personal collection of
        favorites.</p>
    </div>

    <!-- Wishlist Grid -->
    <div *ngIf="wishlist.length > 0; else emptyWishlist"
      class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
      <div *ngFor="let item of wishlist" (click)="viewProduct(item)"
        class="group bg-white rounded-[2.5rem] shadow-sm border border-gray-100 overflow-hidden hover:shadow-2xl hover:shadow-red-500/10 transition-all duration-500 relative flex flex-col cursor-pointer">

        <!-- Product Image Container -->
        <div class="relative h-72 overflow-hidden bg-gray-50">
          <img [src]="item.imageUrl" [alt]="item.name"
            class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" />

          <!-- Glossy Overlay -->
          <div
            class="absolute inset-0 bg-gradient-to-t from-black/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500">
          </div>

          <!-- Quick Action: Remove -->
          <button (click)="$event.stopPropagation(); removeFromWishlist(item)"
            class="absolute top-4 right-4 w-10 h-10 bg-white/90 backdrop-blur-md text-gray-400 hover:text-red-600 rounded-full shadow-lg transition-all flex items-center justify-center transform translate-y-[-10px] opacity-0 group-hover:translate-y-0 group-hover:opacity-100 duration-300">
            <i class="fa-solid fa-xmark text-sm font-black"></i>
          </button>

          <!-- Brand Badge -->
          <div class="absolute bottom-4 left-4">
            <span
              class="px-3 py-1 bg-black/70 backdrop-blur-md text-white text-[10px] font-black uppercase tracking-widest rounded-lg shadow-sm">
              {{ item.brand }}
            </span>
          </div>
        </div>

        <!-- Details -->
        <div class="p-8 flex flex-col flex-1 relative">
          <!-- Background Decor -->
          <div
            class="absolute top-0 right-0 w-20 h-20 bg-red-50 rounded-full -translate-y-1/2 translate-x-1/2 opacity-0 group-hover:opacity-40 transition-opacity duration-700">
          </div>

          <h3 class="text-lg font-black text-gray-900 mb-1 group-hover:text-red-600 transition-colors">
            {{ item.name }}
          </h3>
          <p class="text-xl font-black text-gray-900 mt-2">₹{{ item.price }}</p>

          <div class="grid grid-cols-2 gap-3 mt-8">
            <button (click)="$event.stopPropagation(); moveToCart(item)"
              class="bg-gray-900 hover:bg-black text-white px-4 py-3 rounded-2xl font-black text-[10px] tracking-widest uppercase transition-all shadow-lg shadow-gray-200 active:scale-95 flex items-center justify-center gap-2">
              <i class="fa-solid fa-cart-plus"></i> Cart
            </button>

            <button (click)="viewProduct(item)"
              class="bg-red-600 hover:bg-red-700 text-white px-4 py-3 rounded-2xl font-black text-[10px] tracking-widest uppercase transition-all shadow-lg shadow-red-100 active:scale-95 flex items-center justify-center gap-2">
              <i class="fa-solid fa-eye"></i> Details
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Designer Empty State -->
    <ng-template #emptyWishlist>
      <div
        class="max-w-2xl mx-auto flex flex-col items-center justify-center py-32 text-center bg-white rounded-[4rem] shadow-sm border border-gray-100 p-16 animate-fadeIn relative overflow-hidden">

        <div
          class="absolute top-0 right-0 w-64 h-64 bg-red-50 rounded-full blur-3xl opacity-20 -translate-y-1/2 translate-x-1/2">
        </div>

        <div class="w-32 h-32 bg-red-50 rounded-full flex items-center justify-center mb-8 shadow-inner relative group">
          <i
            class="fa-solid fa-heart-crack text-5xl text-red-200 group-hover:scale-110 transition-transform duration-500"></i>
          <div
            class="absolute -top-2 -right-2 w-8 h-8 bg-red-600 text-white rounded-full flex items-center justify-center font-bold text-xs ring-4 ring-white">
            !</div>
        </div>

        <h2 class="text-3xl font-black text-gray-900 mb-4 tracking-tight">Your Wishlist feels lonely</h2>
        <p class="text-gray-500 mb-10 max-w-sm leading-relaxed font-medium">Add the items you love to your wishlist and
          we'll keep them safe for you.</p>

        <a routerLink="/products"
          class="group bg-gray-900 hover:bg-red-600 active:scale-95 text-white px-10 py-5 rounded-3xl font-black shadow-2xl transition-all flex items-center gap-3 tracking-widest uppercase text-xs">
          Explore Collection
          <i class="fa-solid fa-arrow-right text-sm group-hover:translate-x-2 transition-transform"></i>
        </a>
      </div>
    </ng-template>
  </div>
</div>
