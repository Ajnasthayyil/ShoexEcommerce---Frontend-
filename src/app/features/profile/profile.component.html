<div
  class="flex justify-center items-center min-h-screen  px-4 py-16 text-white"

>
*ngIf="user; else noUser"
  <div
    class="bg-white/10 backdrop-blur-lg rounded-2xl shadow-2xl p-8 w-full max-w-md border border-white/10 bg-gradient-to-br from-gray-900 to-gray-800"
  >
    <!-- Profile Header -->
    <div class="flex flex-col items-center text-center mb-6">
      <div
        class="w-24 h-24 rounded-full bg-white/20 flex items-center justify-center text-4xl mb-4 border border-white/20"
      >
        <i class="fa-solid fa-user"></i>
      </div>
      <h1 class="text-3xl font-bold mb-1">Welcome, {{ user.username }} <i class="fa-solid fa-handshake"></i></h1>
      <p class="text-gray-300 text-sm">Manage your account details</p>
    </div>

    <!-- User Info -->
    <div class="space-y-4 text-gray-200 mb-6">
      <p class="flex items-center gap-3">
        <i class="fa-solid fa-user text-red-500"></i>
        <span><strong>Name:</strong> {{ user.fullName || user.username }}</span>
      </p>
      <p class="flex items-center gap-3">
        <i class="fa-solid fa-envelope text-yellow-400"></i>
        <span><strong>Email:</strong> {{ user.email }}</span>
      </p>
      <p class="flex items-center gap-3">
        <i class="fa-solid fa-user-shield text-green-400"></i>
        <span><strong>Role:</strong> {{ user.role }}</span>
      </p>
    </div>

    <!--  Buttons -->
    <div class="flex justify-between gap-3 mb-6">
      <button
        (click)="goToAddToCart()"
        class="w-1/2 py-2  bg-gray-600/40 text-white-400  flex items-center justify-center gap-2"
      >
        <i class="fa-solid fa-cart-shopping "></i> View Add to Cart
      </button>
      <button
        (click)="goToWishlist()"
        class="w-1/2 py-2  bg-gray-600/40 text-white-400  flex items-center justify-center gap-2"
      >
        <i class="fa-solid fa-heart"></i> View Wishlist
      </button>
    </div>

    <!-- Orders Button -->
    <button
      (click)="goToOrders()"
      class="w-full bg-red-600 hover:bg-red-700 text-white font-semibold py-3 rounded-lg shadow-md transition-transform transform hover:scale-[1.03] flex items-center justify-center gap-2"
    >
      <i class="fa-solid fa-bag-shopping"></i> View Orders
    </button>

    <!-- Logout Button -->
    <button
      (click)="logout()"
      class="mt-4 w-full bg-gray-700 hover:bg-gray-800 text-white font-semibold py-2 rounded-lg flex items-center justify-center gap-2 transition-transform transform hover:scale-[1.03]"
    >
      <i class="fa-solid fa-right-from-bracket"></i> Logout
    </button>
  </div>
</div>

<!-- No User Template -->
<ng-template #noUser>
  <p class="text-center text-gray-200 text-lg mt-20">
    User not found. Please log in.
  </p>
</ng-template>
