<div class="pt-20 pb-20 bg-gray-50 text-gray-900">
 <h2 class="text-4xl font-extrabold text-center mt-10 mb-20">
  Get in Touch <i class="fa-solid fa-paper-plane text-red-600"></i>
</h2>

  <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-10 px-6">

    <!-- Contact Info -->
    <div class="bg-white rounded-2xl shadow-lg p-8 border border-gray-200">
      <h3 class="text-2xl font-bold mb-6">
        Contact Information
        <i class="fa-solid fa-phone-volume text-red-600"></i>
      </h3>

      <ul class="space-y-5 text-lg">
        <li class="flex items-center gap-4">
          <i class="fa-solid fa-location-dot text-red-600 text-2xl"></i>
          <span>SM Street, Calicut, India</span>
        </li>

        <li class="flex items-center gap-4">
          <i class="fa-solid fa-headset text-red-600 text-2xl"></i>
          <span>+91 7025882784</span>
        </li>

        <li class="flex items-center gap-4">
          <i class="fa-solid fa-envelope-open-text text-red-600 text-2xl"></i>
          <span>sheoxshop@gmail.com</span>
        </li>
      </ul>

      <div class="mt-8">
        <h4 class="font-semibold mb-3">
          Connect With Us
          <i class="fa-solid fa-share-nodes text-red-600"></i>
        </h4>

        <div class="flex gap-6 text-2xl">
          <i class="fa-brands fa-facebook-f hover:text-blue-600 cursor-pointer"></i>
          <i class="fa-brands fa-instagram hover:text-pink-600 cursor-pointer"></i>
          <i class="fa-brands fa-x-twitter hover:text-black cursor-pointer"></i>
          <i class="fa-brands fa-youtube hover:text-red-600 cursor-pointer"></i>
        </div>
      </div>
    </div>

    <!-- Contact Form -->
    <form class="bg-white rounded-2xl shadow-lg p-8 border border-gray-200 space-y-5">
      <h3 class="text-2xl font-bold mb-6">
        Send Us a Message
        <i class="fa-solid fa-pen-to-square text-red-600"></i>
      </h3>

      <div class="relative">
        <i class="fa-solid fa-user absolute top-4 left-3 text-gray-500"></i>
        <input
          type="text"
          placeholder="Full Name"
          name="name"
          class="w-full pl-10 p-3 rounded-lg border border-gray-300 focus:border-red-600 focus:ring-red-600 outline-none"
        />
      </div>

      <div class="relative">
        <i class="fa-solid fa-envelope absolute top-4 left-3 text-gray-500"></i>
        <input
          type="email"
          placeholder="Email"
          name="email"
          class="w-full pl-10 p-3 rounded-lg border border-gray-300 focus:border-red-600 focus:ring-red-600 outline-none"
        />
      </div>

      <div class="relative">
        <i class="fa-solid fa-tag absolute top-4 left-3 text-gray-500"></i>
        <input
          type="text"
          placeholder="Subject"
          name="subject"
          class="w-full pl-10 p-3 rounded-lg border border-gray-300 focus:border-red-600 focus:ring-red-600 outline-none"
        />
      </div>

      <div class="relative">
        <i class="fa-solid fa-message absolute top-4 left-3 text-gray-500"></i>
        <textarea
          rows="4"
          placeholder="Message"
          name="message"
          class="w-full pl-10 p-3 rounded-lg border border-gray-300 focus:border-red-600 focus:ring-red-600 outline-none"
        ></textarea>
      </div>

      <button
        type="submit"
        class="w-full bg-red-600 text-white font-semibold py-3 rounded-lg hover:bg-red-700 transition"
      >
        Send Message <i class="fa-solid fa-paper-plane ml-2"></i>
      </button>
    </form>

  </div>
</div>
